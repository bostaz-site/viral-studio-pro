<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f97316" />
  <title>Offline — Viral Animal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 24rem; }
    .logo {
      width: 3.5rem; height: 3.5rem; border-radius: 0.75rem;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 900; color: #fff;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { color: #a1a1aa; font-size: 0.875rem; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(135deg, #f97316, #f59e0b);
      color: #fff; border: none; border-radius: 0.5rem;
      padding: 0.625rem 1.5rem; font-size: 0.875rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">VA</div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
